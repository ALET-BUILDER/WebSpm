[phases.setup]
nixPkgs = ["nodejs", "chromium"]

[phases.install]
cmds = [
  "npm install --production=false",
  "npm install express socket.io cors bcryptjs multer fs-extra uuid qrcode whatsapp-web.js dotenv jsonwebtoken puppeteer-core"
]

[phases.start]
cmds = ["npm start"]

[environment]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/nix/store/*chromium/bin/chromium"
NODE_ENV = "production"